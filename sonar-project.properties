# SonarCloud Configuration - Backend

# Project identification
sonar.projectKey=DSW-01
sonar.projectName=DSW-01
sonar.projectVersion=0.0.1-SNAPSHOT

# Source code location
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=17
sonar.java.target=17

# Exclude patterns
sonar.exclusions=**/config/**,**/dto/**,**/entity/**,**/repository/**

# Code coverage settings (JaCoCo)
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.coverage.exclusions=**/config/**,**/dto/**,**/entity/**,**/repository/**

# Test settings
sonar.junit.reportPaths=target/surefire-reports

# Code quality settings
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

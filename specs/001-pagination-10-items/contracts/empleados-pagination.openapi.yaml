openapi: 3.0.3
info:
  title: API Empleados - Paginación
  version: 1.0.0
  description: Contrato para listado paginado de empleados con tamaño fijo de 10.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/empleados:
    get:
      summary: Listar empleados paginados
      security:
        - basicAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Página de empleados (10 por consulta)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmpleadosResponse"
        "401":
          description: No autenticado
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    PaginatedEmpleadosResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/EmpleadoResponse"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          enum: [10]
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    EmpleadoResponse:
      type: object
      required:
        - clave
        - nombre
        - direccion
        - telefono
      properties:
        clave:
          type: string
          pattern: "^EMP-[1-9][0-9]*$"
        nombre:
          type: string
        direccion:
          type: string
        telefono:
          type: string

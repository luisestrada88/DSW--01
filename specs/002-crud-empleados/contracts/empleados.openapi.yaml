openapi: 3.0.3
info:
  title: API CRUD Empleados
  version: 1.1.0
  description: Contrato de API para operaciones CRUD de empleados.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/empleados:
    get:
      summary: Listar empleados
      security:
        - basicAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Lista paginada de empleados (10 por consulta)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmpleadosResponse"
        "401":
          description: No autenticado
    post:
      summary: Crear empleado
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoCreateRequest"
      responses:
        "201":
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "409":
          description: Conflicto en generación de clave
  /api/v1/empleados/{clave}:
    get:
      summary: Obtener empleado por clave
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      responses:
        "200":
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
    put:
      summary: Actualizar empleado por clave
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoUpdateRequest"
      responses:
        "200":
          description: Empleado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
    delete:
      summary: Eliminar empleado por clave
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      responses:
        "204":
          description: Empleado eliminado
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    PaginatedEmpleadosResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/EmpleadoResponse"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          enum: [10]
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    EmpleadoCreateRequest:
      type: object
      required:
        - nombre
        - direccion
        - telefono
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
    EmpleadoUpdateRequest:
      type: object
      required:
        - nombre
        - direccion
        - telefono
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
    EmpleadoResponse:
      type: object
      required:
        - clave
        - nombre
        - direccion
        - telefono
      properties:
        clave:
          type: string
          pattern: "^EMP-[1-9][0-9]*$"
        nombre:
          type: string
        direccion:
          type: string
        telefono:
          type: string

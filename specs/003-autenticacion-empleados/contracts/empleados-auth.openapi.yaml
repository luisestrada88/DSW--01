openapi: 3.0.3
info:
  title: API Empleados con Autenticación por Correo
  version: 1.2.0
  description: >-
    Contrato de API para gestión de empleados protegida con HTTP Basic Auth,
    usando correo + contraseña de empleado.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/empleados:
    get:
      summary: Listar empleados
      security:
        - basicAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Lista paginada de empleados (10 por consulta)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmpleadosResponse"
        "401":
          description: No autenticado (credenciales inválidas o ausentes)
        "423":
          description: Cuenta temporalmente bloqueada
    post:
      summary: Crear empleado con credenciales
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoCreateRequest"
      responses:
        "201":
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "409":
          description: Correo duplicado
        "423":
          description: Cuenta temporalmente bloqueada
  /api/v1/empleados/{clave}:
    get:
      summary: Obtener empleado por clave
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      responses:
        "200":
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
        "423":
          description: Cuenta temporalmente bloqueada
    put:
      summary: Actualizar empleado y credenciales
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoUpdateRequest"
      responses:
        "200":
          description: Empleado actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmpleadoResponse"
        "400":
          description: Error de validación
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
        "409":
          description: Correo duplicado
        "423":
          description: Cuenta temporalmente bloqueada
    delete:
      summary: Eliminar empleado por clave
      security:
        - basicAuth: []
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: "^EMP-[1-9][0-9]*$"
      responses:
        "204":
          description: Empleado eliminado
        "401":
          description: No autenticado
        "404":
          description: Empleado no encontrado
        "423":
          description: Cuenta temporalmente bloqueada
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    PaginatedEmpleadosResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/EmpleadoResponse"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          enum: [10]
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    EmpleadoCreateRequest:
      type: object
      required:
        - nombre
        - direccion
        - telefono
        - correo
        - password
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
        correo:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          pattern: "^(?=.*[A-Za-z])(?=.*\\d).{8,}$"
    EmpleadoUpdateRequest:
      type: object
      required:
        - nombre
        - direccion
        - telefono
        - correo
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
        correo:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          pattern: "^(?=.*[A-Za-z])(?=.*\\d).{8,}$"
          description: >-
            Opcional en actualización. Si se envía, reemplaza la contraseña previa.
    EmpleadoResponse:
      type: object
      required:
        - clave
        - nombre
        - direccion
        - telefono
        - correo
        - activo
      properties:
        clave:
          type: string
          pattern: "^EMP-[1-9][0-9]*$"
        nombre:
          type: string
        direccion:
          type: string
        telefono:
          type: string
        correo:
          type: string
          format: email
        activo:
          type: boolean
    ApiError:
      type: object
      required:
        - timestamp
        - status
        - error
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

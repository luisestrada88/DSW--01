name: 02-SonarCloud

env:
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}

on:
  workflow_run:
    workflows: ["01 CI Tests"]
    types: [completed]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.pull_requests[0].base.ref == 'master' ||
       github.event.workflow_run.pull_requests[0].base.ref == 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate SonarCloud organization
        run: |
          if [ -z "${SONAR_ORGANIZATION}" ]; then
            echo "Missing SONAR_ORGANIZATION (configure it as Repository Variable or Secret)"
            exit 1
          fi

      - name: Validate SonarCloud token
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "Missing SONAR_TOKEN secret"
            exit 1
          fi

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: SonarCloud Scan (Maven)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B -Dorg.slf4j.simpleLogger.defaultLogLevel=warn -Dtest=com.example.empleados.unit.*Test test jacoco:report
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=luisestrada88_DSW--01
          -Dsonar.organization=${SONAR_ORGANIZATION}
          -Dsonar.sources=src/main/java,frontend/src
          -Dsonar.tests=src/test/java,frontend/src
          -Dsonar.test.inclusions=**/*Test.java,**/*.spec.ts,**/*.test.ts
          -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/cypress/**,**/*.cy.ts
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

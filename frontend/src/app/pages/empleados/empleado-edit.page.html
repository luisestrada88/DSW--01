<section class="shell">
  <article class="card">
    <h1>Editar empleado</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="nombre">Nombre</label>
      <input id="nombre" formControlName="nombre" />

      <label for="direccion">Dirección</label>
      <input id="direccion" formControlName="direccion" />

      <label for="telefono">Teléfono</label>
      <input id="telefono" formControlName="telefono" />

      <label for="correo">Correo</label>
      <input id="correo" type="email" formControlName="correo" />

      <label for="password">Nueva password (opcional)</label>
      <input id="password" type="password" formControlName="password" />

      <label for="departamentoId">Departamento ID</label>
      <input id="departamentoId" type="number" formControlName="departamentoId" />

      <p class="status" *ngIf="message()">{{ message() }}</p>

      <div class="actions">
        <button type="submit" [disabled]="loading()">Guardar cambios</button>
        <a routerLink="/empleados">Cancelar</a>
      </div>
    </form>
  </article>
</section>

services:
  postgres:
    image: postgres:16-alpine
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: empleadosdb
      POSTGRES_USER: empleados
      POSTGRES_PASSWORD: empleados
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados -d empleadosdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: empleados-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empleadosdb
      SPRING_DATASOURCE_USERNAME: empleados
      SPRING_DATASOURCE_PASSWORD: empleados
      APP_BASIC_AUTH_USER: admin@local.test
      APP_BASIC_AUTH_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: empleados-frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-/api/v1}
    depends_on:
      - api
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    container_name: empleados-proxy
    depends_on:
      - api
      - frontend
    ports:
      - "4200:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/actuador >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
